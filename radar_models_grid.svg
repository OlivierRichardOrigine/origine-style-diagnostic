<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .radar-label { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; font-size: 9.5px; font-weight: 400; fill: #1A1A1A; letter-spacing: 0.04em; }
      .grid-line { fill: none; stroke: #1A1A1A; stroke-width: 0.5; opacity: 0.15; }
      .axis-line { stroke: #1A1A1A; stroke-width: 0.4; opacity: 0.12; fill: none; }
    </style>
  </defs>
  <rect width="400" height="400" fill="#ECE6DF"/>

  <!-- Center: 200, 205 | Radius: 120 -->

  <!-- Grid rings -->
  <circle cx="200" cy="205" r="40" class="grid-line"/>
  <circle cx="200" cy="205" r="80" class="grid-line"/>
  <circle cx="200" cy="205" r="120" class="grid-line"/>

  <!-- 20 axes — 18° each -->
  <line x1="200" y1="205" x2="200" y2="85" class="axis-line"/>
  <line x1="200" y1="205" x2="237" y2="87" class="axis-line"/>
  <line x1="200" y1="205" x2="270" y2="97" class="axis-line"/>
  <line x1="200" y1="205" x2="297" y2="114" class="axis-line"/>
  <line x1="200" y1="205" x2="315" y2="143" class="axis-line"/>
  <line x1="200" y1="205" x2="320" y2="205" class="axis-line"/>
  <line x1="200" y1="205" x2="315" y2="267" class="axis-line"/>
  <line x1="200" y1="205" x2="297" y2="296" class="axis-line"/>
  <line x1="200" y1="205" x2="270" y2="313" class="axis-line"/>
  <line x1="200" y1="205" x2="237" y2="323" class="axis-line"/>
  <line x1="200" y1="205" x2="200" y2="325" class="axis-line"/>
  <line x1="200" y1="205" x2="163" y2="323" class="axis-line"/>
  <line x1="200" y1="205" x2="130" y2="313" class="axis-line"/>
  <line x1="200" y1="205" x2="103" y2="296" class="axis-line"/>
  <line x1="200" y1="205" x2="85" y2="267" class="axis-line"/>
  <line x1="200" y1="205" x2="80" y2="205" class="axis-line"/>
  <line x1="200" y1="205" x2="85" y2="143" class="axis-line"/>
  <line x1="200" y1="205" x2="103" y2="114" class="axis-line"/>
  <line x1="200" y1="205" x2="130" y2="97" class="axis-line"/>
  <line x1="200" y1="205" x2="163" y2="87" class="axis-line"/>

  <!-- Labels -->
  <text class="radar-label" x="200" y="77" text-anchor="middle">Solitaire cl.</text>
  <text class="radar-label" x="241" y="79" text-anchor="start">Solitaire ca.</text>
  <text class="radar-label" x="274" y="90" text-anchor="start">Halo</text>
  <text class="radar-label" x="300" y="108" text-anchor="start">Double halo</text>
  <text class="radar-label" x="318" y="138" text-anchor="start">Trois pierres</text>
  <text class="radar-label" x="325" y="209" text-anchor="start">Cinq pierres</text>
  <text class="radar-label" x="318" y="272" text-anchor="start">Toi et Moi</text>
  <text class="radar-label" x="300" y="301" text-anchor="start">Pavé band</text>
  <text class="radar-label" x="274" y="320" text-anchor="start">Hidden halo</text>
  <text class="radar-label" x="240" y="334" text-anchor="start">Split shank</text>
  <text class="radar-label" x="200" y="340" text-anchor="middle">Bypass</text>
  <text class="radar-label" x="160" y="334" text-anchor="end">Tension</text>
  <text class="radar-label" x="126" y="320" text-anchor="end">Bezel / Clos</text>
  <text class="radar-label" x="100" y="301" text-anchor="end">East-West</text>
  <text class="radar-label" x="82" y="272" text-anchor="end">Cluster</text>
  <text class="radar-label" x="75" y="209" text-anchor="end">Vintage fil.</text>
  <text class="radar-label" x="82" y="138" text-anchor="end">Nature/Floral</text>
  <text class="radar-label" x="100" y="108" text-anchor="end">Sculptural</text>
  <text class="radar-label" x="126" y="90" text-anchor="end">Sol. organique</text>
  <text class="radar-label" x="159" y="79" text-anchor="end">Organique st.</text>

  <!-- Center dot -->
  <circle cx="200" cy="205" r="2.5" fill="#C4A265" opacity="0.8"/>
</svg>
